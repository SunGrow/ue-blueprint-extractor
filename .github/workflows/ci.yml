name: ci

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      run_ue_5_6:
        description: 'Run UE 5.6 self-hosted automation'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  mcp-contract:
    name: mcp-contract (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - '18'
          - 'lts/*'
    defaults:
      run:
        working-directory: MCP
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: MCP/package-lock.json

      - name: npm ci
        run: npm ci

      - name: MCP unit contract suite
        run: npm run test:unit

      - name: MCP stdio suite
        run: npm run test:stdio

      - name: MCP tarball startup smoke
        run: npm run test:pack-smoke

      - name: MCP publish gate
        run: npm run test:publish-gate

  ue-automation-5_6:
    name: ue-automation-5_6 (headless)
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_ue_5_6) || (github.event_name != 'workflow_dispatch' && vars.UE_5_6_CI_ENABLED == 'true' && vars.UE_5_6_ROOT != '') }}
    runs-on:
      - self-hosted
      - Windows
      - ue-5.6
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: UE 5.6 headless gate
        shell: pwsh
        run: >
          ./scripts/test-ue.ps1
          -EngineRoot "${{ vars.UE_5_6_ROOT }}"
          -AutomationFilter "BlueprintExtractor"
          -FailOnWarnings
