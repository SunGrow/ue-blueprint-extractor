name: ci

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mcp-contract:
    name: mcp-contract (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - '18'
          - 'lts/*'
    defaults:
      run:
        working-directory: MCP
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: MCP/package-lock.json

      - name: npm ci
        run: npm ci

      - name: MCP unit contract suite
        run: npm run test:unit

      - name: MCP stdio suite
        run: npm run test:stdio

      - name: MCP tarball startup smoke
        run: npm run test:pack-smoke

      - name: MCP publish dry-run
        run: npm publish --dry-run

  ue-automation-5_6:
    name: ue-automation-5_6
    runs-on:
      - self-hosted
      - Windows
      - ue-5.6
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: UE 5.6 authoring automation
        shell: pwsh
        run: >
          ./scripts/test-ue.ps1
          -EngineRoot "${{ vars.UE_5_6_ROOT }}"
          -AutomationFilter "BlueprintExtractor.Authoring"

      - name: UE 5.6 BuildPlugin packaging gate
        shell: pwsh
        run: >
          ./scripts/test-ue.ps1
          -EngineRoot "${{ vars.UE_5_6_ROOT }}"
          -BuildPlugin
          -AutomationFilter "BlueprintExtractor.Authoring.CommonUIWidgetRoundTrip"

  ue-automation-5_7:
    name: ue-automation-5_7
    runs-on:
      - self-hosted
      - Windows
      - ue-5.7
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: UE 5.7 authoring automation
        shell: pwsh
        run: >
          ./scripts/test-ue.ps1
          -EngineRoot "${{ vars.UE_5_7_ROOT }}"
          -AutomationFilter "BlueprintExtractor.Authoring"

      - name: UE 5.7 BuildPlugin packaging gate
        shell: pwsh
        run: >
          ./scripts/test-ue.ps1
          -EngineRoot "${{ vars.UE_5_7_ROOT }}"
          -BuildPlugin
          -AutomationFilter "BlueprintExtractor.Authoring.CommonUIWidgetRoundTrip"
