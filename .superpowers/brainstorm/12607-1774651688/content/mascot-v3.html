<!DOCTYPE html>

  .card p { font-size:11px; color:#888; margin:8px 0 0; }

    <div class="card" style="background:#161b22; border:1px solid #30363d;">

  <div class="sizes">

    <div>
      <object data="/file/D:/Development/llm-tools/gnomeflow/logo.svg" type="image/svg+xml" width="40" height="48"></object>
      <span>Icon (40px)</span>

    <div>
      <object data="/file/D:/Development/llm-tools/gnomeflow/logo.svg" type="image/svg+xml" width="16" height="19"></object>

</html>
